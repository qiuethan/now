name: Update now page

on:
  schedule:
    - cron: "17 * * * *" # hourly, off the top-of-hour rush — the ONLY automatic generation
  workflow_dispatch: # manual re-generate (e.g. after editing config/now.json)

permissions:
  contents: write

concurrency:
  group: update-now-page
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate now page
        run: npm run generate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Commit if changed
        run: |
          git config user.name "now-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/now.md public/now.json public/tools.json public/tools
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: refresh now page"
            git push
          fi
